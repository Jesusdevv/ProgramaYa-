<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Crear Nuevo Curso - ProgramaYa!</title>
    
    <!-- Tailwind CSS y Fuentes -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#6a47af",
                        "secondary": "#7b41b3",
                        "surface-container": "#ffffff",
                        "lavender-light": "#E6E6FA"
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/crear_curso.css') }}">
</head>
<body class="bg-[#f9f9f9] min-h-screen">

    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <span class="material-symbols-outlined text-primary text-3xl font-bold">menu_book</span>
            <span class="text-xl font-bold text-purple-950 tracking-tight">ProgramaYa! <span class="text-primary text-sm font-medium">Panel de Creadores</span></span>
        </div>
        <a href="/perfil" class="text-sm font-semibold text-primary hover:underline">Volver al perfil</a>
    </header>

    <main class="p-6 max-w-6xl w-full mx-auto">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-purple-950">Constructor de Cursos</h1>
            <p class="text-sm text-gray-600">Diseña el contenido general del curso y sus capítulos iniciales en una sola pantalla.</p>
        </div>

        <div id="alert-container" class="hidden mb-6 p-4 rounded-xl text-sm font-medium"></div>

        <!-- Formulario Unificado -->
        <form id="curso-form" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <!-- Columna Izquierda: Datos del Curso -->
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-4">
                <h2 class="text-lg font-bold text-purple-950 border-b pb-2 flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">info</span> Información del Curso
                </h2>
                
                <div class="space-y-1">
                    <label class="text-sm font-semibold text-purple-950" for="titulo">Título del Curso</label>
                    <input class="w-full h-12 rounded-xl border-none input-lavender px-4 text-gray-900" id="titulo" placeholder="Ej: Introducción Avanzada a Python" type="text" required/>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-purple-950" for="lenguaje">Lenguaje</label>
                        <select class="w-full h-12 rounded-xl border-none input-lavender px-4 text-gray-900" id="lenguaje" required>
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-purple-950" for="nivel">Nivel</label>
                        <select class="w-full h-12 rounded-xl border-none input-lavender px-4 text-gray-900" id="nivel" required>
                            <option value="Básico">Básico</option>
                            <option value="Intermedio">Intermedio</option>
                            <option value="Avanzado">Avanzado</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-semibold text-purple-950" for="descripcion">Descripción Breve</label>
                    <textarea class="w-full p-4 rounded-xl border-none input-lavender text-gray-900 min-h-[120px]" id="descripcion" placeholder="¿De qué trata este curso y qué aprenderán los estudiantes?" required></textarea>
                </div>
            </div>

            <!-- Columna Derecha: Estructura de Capítulos -->
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-center border-b pb-2 mb-4">
                        <h2 class="text-lg font-bold text-purple-950 flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary">format_list_bulleted</span> Capítulos Iniciales
                        </h2>
                        <button type="button" id="btn-add-capitulo" class="text-xs bg-purple-100 text-primary font-bold px-3 py-2 rounded-xl hover:bg-purple-200 transition-colors flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm font-bold">add</span> Añadir Capítulo
                        </button>
                    </div>

                    <!-- Contenedor donde se insertan dinámicamente los capítulos -->
                    <div id="capitulos-container" class="space-y-3 max-h-[320px] overflow-y-auto pr-2">
                        <!-- Primer capítulo obligatorio por defecto -->
                        <div class="capitulo-item bg-gray-50 p-3 rounded-xl border border-gray-200 flex items-center gap-3">
                            <span class="text-xs font-bold text-purple-950 bg-purple-200/60 w-6 h-6 flex items-center justify-center rounded-full index-label">1</span>
                            <input class="w-full h-10 rounded-lg border-none bg-white shadow-sm px-3 text-sm text-gray-900 cap-input" placeholder="Nombre del capítulo inicial (ej: Variables y Tipos de Datos)" type="text" required/>
                        </div>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-100 mt-4">
                    <button id="btn-submit" type="submit" class="w-full h-12 bg-primary text-white font-semibold rounded-xl shadow-md shadow-primary/20 hover:bg-purple-800 active:scale-[0.99] transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">save</span> Publicar Curso Completo
                    </button>
                </div>
            </div>

        </form>
    </main>

    <script src="{{ url_for('static', filename='js/crear_curso.js') }}"></script>
</body>
</html>
