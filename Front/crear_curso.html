<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Crear Nuevo Curso - ProgramaYa!</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#6a47af",
        "secondary": "#7b41b3",
        "surface": "#ffffff",
        "surface-variant": "#e2e2e2",
        "on-surface": "#1a1c1c",
        "on-surface-variant": "#4a4452",
        "on-primary": "#ffffff",
        "primary-fixed": "#eaddff",
        "primary-fixed-dim": "#d2bbff",
        "secondary-container": "#c588fe",
        "error": "#ba1a1a",
        "error-container": "#ffdad6",
        "outline": "#7b7483",
        "outline-variant": "#cbc3d4"
      },
      fontFamily: {
        sans: ["Plus Jakarta Sans", "sans-serif"]
      }
    }
  }
}
</script>
<link rel="stylesheet" href="/static/css/crear_curso.css">
</head>
<body class="bg-[#f9f9f9] text-on-surface min-h-screen">
<header class="bg-surface border-b border-on-surface h-16 fixed top-0 w-full z-40 flex justify-between items-center px-4 md:px-lg max-w-container-max mx-auto left-0 right-0">
<div class="flex items-center gap-2">
<span class="text-2xl font-extrabold text-primary">ProgramaYa!</span>
</div>
<div class="flex items-center relative">
<span class="text-sm font-semibold text-primary mr-3 hidden sm:block">Sesi&oacute;n iniciada</span>
<button id="menu-btn" class="p-2 hover:bg-surface-variant rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface text-2xl">menu</span>
</button>
<div id="menu-dropdown" class="hidden absolute top-full right-0 mt-2 w-64 bg-white border border-outline-variant rounded-2xl shadow-xl z-50 overflow-hidden">
<button id="btn-inicio" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant transition-colors text-left">
<span class="material-symbols-outlined text-primary">home</span>
<span class="text-base text-on-surface">Inicio</span>
</button>
<button id="btn-crear-curso" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant transition-colors text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary">add_circle</span>
<span class="text-base text-on-surface">Crear Curso</span>
</button>
<button id="btn-crear-capitulo" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant transition-colors text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary">note_add</span>
<span class="text-base text-on-surface">Crear Cap&iacute;tulo</span>
</button>
<button id="btn-cursos" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant transition-colors text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary">school</span>
<span class="text-base text-on-surface">Cursos</span>
</button>
<button id="btn-perfil" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant transition-colors text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary">person</span>
<span class="text-base text-on-surface">Perfil</span>
</button>
<button id="btn-logout" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-red-50 transition-colors text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-red-500">logout</span>
<span class="text-base text-red-500">Cerrar Sesi&oacute;n</span>
</button>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-4 md:px-lg max-w-container-max mx-auto min-h-screen">
<div class="mb-6">
<h1 class="text-2xl font-bold text-purple-950">Constructor de Cursos</h1>
<p class="text-sm text-gray-600">Dise&ntilde;a el contenido general del curso y sus cap&iacute;tulos iniciales en una sola pantalla.</p>
</div>
<div id="alert-container" class="hidden mb-6 p-4 rounded-xl text-sm font-medium"></div>
<form id="curso-form" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
<div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-4">
<h2 class="text-lg font-bold text-purple-950 border-b pb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">info</span> Informaci&oacute;n del Curso
</h2>
<div class="space-y-1">
<label class="text-sm font-semibold text-purple-950" for="titulo">T&iacute;tulo del Curso</label>
<input class="w-full h-12 rounded-xl border-none input-lavender px-4 text-gray-900" id="titulo" placeholder="Ej: Introducci&oacute;n Avanzada a Python" type="text" required/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="text-sm font-semibold text-purple-950" for="lenguaje">Lenguaje</label>
<select class="w-full h-12 rounded-xl border-none input-lavender px-4 text-gray-900" id="lenguaje" required>
<option value="javascript">JavaScript</option>
<option value="python">Python</option>
</select>
</div>
<div class="space-y-1">
<label class="text-sm font-semibold text-purple-950" for="nivel">Nivel</label>
<select class="w-full h-12 rounded-xl border-none input-lavender px-4 text-gray-900" id="nivel" required>
<option value="B&aacute;sico">B&aacute;sico</option>
<option value="Intermedio">Intermedio</option>
<option value="Avanzado">Avanzado</option>
</select>
</div>
</div>
<div class="space-y-1">
<label class="text-sm font-semibold text-purple-950" for="descripcion">Descripci&oacute;n Breve</label>
<textarea class="w-full p-4 rounded-xl border-none input-lavender text-gray-900 min-h-[120px]" id="descripcion" placeholder="&iquest;De qu&eacute; trata este curso y qu&eacute; aprender&aacute;n los estudiantes?" required></textarea>
</div>
<div class="space-y-1">
<label class="text-sm font-semibold text-purple-950" for="imagen_url">Imagen del curso (URL)</label>
<div class="flex gap-2">
<input class="flex-1 h-12 rounded-xl border-none input-lavender px-4 text-gray-900" id="imagen_url" placeholder="https://ejemplo.com/imagen.jpg" type="url"/>
<button type="button" id="btn-preview-img" class="h-12 px-4 bg-purple-100 text-primary font-semibold rounded-xl hover:bg-purple-200 transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
<img id="preview-img" class="mt-2 hidden w-full h-40 object-cover rounded-xl border border-gray-200" src="#" alt="Vista previa"/>
</div>
</div>
<div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex flex-col justify-between">
<div>
<div class="flex justify-between items-center border-b pb-2 mb-4">
<h2 class="text-lg font-bold text-purple-950 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">format_list_bulleted</span> Cap&iacute;tulos Iniciales
</h2>
<button type="button" id="btn-add-capitulo" class="text-xs bg-purple-100 text-primary font-bold px-3 py-2 rounded-xl hover:bg-purple-200 transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-sm font-bold">add</span> A&ntilde;adir Cap&iacute;tulo
</button>
</div>
<div id="capitulos-container" class="space-y-3 max-h-[320px] overflow-y-auto pr-2">
<div class="capitulo-item bg-gray-50 p-3 rounded-xl border border-gray-200">
<div class="flex items-center gap-3">
<span class="text-xs font-bold text-purple-950 bg-purple-200/60 w-6 h-6 flex items-center justify-center rounded-full index-label">1</span>
<input class="flex-1 h-10 rounded-lg border-none bg-white shadow-sm px-3 text-sm text-gray-900 cap-input" placeholder="Nombre del cap&iacute;tulo (ej: Variables y Tipos de Datos)" type="text" required/>
</div>
<div class="mt-2 ml-9">
<input class="w-full h-9 rounded-lg border border-purple-200 bg-white/70 shadow-sm px-3 text-sm text-gray-900 mod-input" placeholder="M&oacute;dulo al que pertenece (ej: Fundamentos B&aacute;sicos)" type="text"/>
</div>
</div>
</div>
</div>
<div class="pt-4 border-t border-gray-100 mt-4">
<button id="btn-submit" type="submit" class="w-full h-12 bg-primary text-white font-semibold rounded-xl shadow-md shadow-primary/20 hover:bg-purple-800 active:scale-[0.99] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span> Publicar Curso Completo
</button>
</div>
</div>
</form>
</main>
<script src="/static/js/crear_curso.js"></script>
</body>
</html>
