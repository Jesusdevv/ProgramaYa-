<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registro - ProgramaYa!</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/registro_usuario.css">
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-highest": "#e2e2e2",
                      "on-surface-variant": "#4a4452",
                      "surface-container-low": "#f3f3f4",
                      "on-error": "#ffffff",
                      "background": "#ffffff",
                      "tertiary-fixed": "#e1e1f5",
                      "secondary": "#7b41b3",
                      "secondary-fixed-dim": "#ddb7ff",
                      "tertiary-fixed-dim": "#c5c5d8",
                      "on-tertiary-fixed": "#191b29",
                      "surface": "#ffffff",
                      "primary-container": "#8361ca",
                      "surface-bright": "#f9f9f9",
                      "primary": "#6a47af",
                      "tertiary": "#595b6b",
                      "on-tertiary-container": "#fffbff",
                      "on-secondary-fixed-variant": "#622599",
                      "secondary-container": "#c588fe",
                      "inverse-surface": "#2f3131",
                      "inverse-primary": "#d2bbff",
                      "on-primary-container": "#fffbff",
                      "surface-tint": "#6c49b2",
                      "on-secondary-fixed": "#2c0050",
                      "on-primary-fixed": "#25005a",
                      "tertiary-container": "#727385",
                      "surface-container-high": "#e8e8e8",
                      "inverse-on-surface": "#f0f1f1",
                      "on-primary": "#ffffff",
                      "surface-dim": "#dadada",
                      "surface-container-lowest": "#ffffff",
                      "on-error-container": "#93000a",
                      "outline": "#7b7483",
                      "on-background": "#1a1c1c",
                      "on-tertiary": "#ffffff",
                      "outline-variant": "#cbc3d4",
                      "on-tertiary-fixed-variant": "#444655",
                      "error": "#ba1a1a",
                      "primary-fixed": "#eaddff",
                      "on-secondary-container": "#54118a",
                      "primary-fixed-dim": "#d2bbff",
                      "on-primary-fixed-variant": "#543098",
                      "surface-container": "#eeeeee",
                      "on-secondary": "#ffffff",
                      "surface-variant": "#e2e2e2",
                      "secondary-fixed": "#f0dbff",
                      "on-surface": "#1a1c1c",
                      "error-container": "#ffdad6"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xs": "4px",
                      "md": "24px",
                      "lg": "40px",
                      "gutter": "24px",
                      "xl": "64px",
                      "container-max": "1200px",
                      "sm": "12px",
                      "base": "8px"
              },
              "fontFamily": {
                      "headline-lg": ["Plus Jakarta Sans"],
                      "label-sm": ["Plus Jakarta Sans"],
                      "body-lg": ["Plus Jakarta Sans"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "headline-lg-mobile": ["Plus Jakarta Sans"],
                      "body-md": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "headline-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-sm": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "600"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                      "headline-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}]

          },
        }

</head>
<body class="bg-surface">
<main class="w-full max-w-[480px] px-gutter py-xl flex flex-col items-center">
<header class="mb-lg text-center">
<h1 class="font-headline-lg text-headline-lg text-on-secondary-fixed-variant mb-xs">Registro</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Crea una cuenta para empezar a gestionar tus proyectos.</p>
</header>
<form class="w-full flex flex-col gap-md" id="registro-form">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-primary" for="username">Nombre de usuario</label>
<div class="input-well rounded-lg flex items-center px-md py-sm">
<span class="material-symbols-outlined text-primary mr-sm text-[20px]" data-icon="person">person</span>
<input class="bg-transparent border-none outline-none ring-0 w-full font-body-md text-on-surface placeholder:text-on-surface-variant/50 p-0 focus:ring-0" id="username" name="username" placeholder="Tu nombre de usuario" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-primary" for="email">Correo electrónico</label>
<div class="input-well rounded-lg flex items-center px-md py-sm">
<span class="material-symbols-outlined text-primary mr-sm text-[20px]" data-icon="mail">mail</span>
<input class="bg-transparent border-none outline-none ring-0 w-full font-body-md text-on-surface placeholder:text-on-surface-variant/50 p-0 focus:ring-0" id="email" name="email" placeholder="ejemplo@correo.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-primary" for="password">Contraseña</label>
<div class="input-well rounded-lg flex items-center px-md py-sm">
<span class="material-symbols-outlined text-primary mr-sm text-[20px]" data-icon="lock">lock</span>
<input class="bg-transparent border-none outline-none ring-0 w-full font-body-md text-on-surface placeholder:text-on-surface-variant/50 p-0 focus:ring-0" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-primary" for="confirm-password">Confirmar contraseña</label>
<div class="input-well rounded-lg flex items-center px-md py-sm">
<span class="material-symbols-outlined text-primary mr-sm text-[20px]" data-icon="lock_reset">lock_reset</span>
<input class="bg-transparent border-none outline-none ring-0 w-full font-body-md text-on-surface placeholder:text-on-surface-variant/50 p-0 focus:ring-0" id="confirm-password" name="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="mt-base h-14 w-full bg-on-secondary-fixed-variant text-on-primary font-headline-md text-[16px] rounded-lg primary-btn-shadow hover:bg-primary transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-sm" id="btn-submit" type="submit">Registrarse<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span></button>
<div class="mt-md text-center">
<p class="font-body-md text-on-surface-variant">¿Ya tienes una cuenta? <a class="relative inline-block ml-xs font-label-sm text-primary link-underline hover:opacity-80 transition-opacity" href="/inicio-sesion">Ir al inicio de sesión</a></p>
</div>
</form>
</main>
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-30">
<div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-secondary-fixed-dim blur-3xl"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-tertiary-fixed blur-3xl"></div>
</div>
<script src="/static/js/registro_usuario.js"></script>
</body>
</html>
