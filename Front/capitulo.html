<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Capítulo - ProgramaYa</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/capitulo.css">
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
                      "primary": "#8a2be2",
                      "on-primary": "#ffffff",
                      "primary-container": "#eed9ff",
                      "on-primary-container": "#2c0051",
                      "primary-fixed": "#efdbff",
                      "primary-fixed-dim": "#dcb8ff",
                      "on-primary-fixed": "#2c0051",
                      "on-primary-fixed-variant": "#6700b5",
                      "secondary": "#605d64",
                      "on-secondary": "#ffffff",
                      "secondary-container": "#f0f0f0",
                      "on-secondary-container": "#474747",
                      "secondary-fixed": "#e2e2e2",
                      "secondary-fixed-dim": "#c6c6c6",
                      "on-secondary-fixed": "#1b1b1b",
                      "on-secondary-fixed-variant": "#474747",
                      "surface": "#ffffff",
                      "surface-dim": "#dadada",
                      "surface-bright": "#f9f9f9",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-low": "#f3f3f4",
                      "surface-container": "#eeeeee",
                      "surface-container-high": "#e8e8e8",
                      "surface-container-highest": "#e2e2e2",
                      "surface-variant": "#e2e2e2",
                      "on-surface": "#1a1c1c",
                      "on-surface-variant": "#4a4452",
                      "background": "#f9f9f9",
                      "on-background": "#1a1c1c",
                      "outline": "#7b7483",
                      "outline-variant": "#cbc3d4",
                      "error": "#ba1a1a",
                      "on-error": "#ffffff",
                      "error-container": "#ffdad6",
                      "on-error-container": "#93000a",
                      "inverse-surface": "#2f3131",
                      "inverse-on-surface": "#f0f1f1",
                      "inverse-primary": "#d2bbff",
                      "surface-tint": "#8a2be2",
                      "tertiary": "#8a2be2",
                      "tertiary-container": "#630ed4",
                      "on-tertiary": "#ffffff",
                      "on-tertiary-container": "#fffbff",
                      "tertiary-fixed": "#eaddff",
                      "tertiary-fixed-dim": "#d2bbff",
                      "on-tertiary-fixed": "#25005a",
                      "on-tertiary-fixed-variant": "#5a00c6"
      },
      fontFamily: {
        sans: ["Hanken Grotesk", "sans-serif"]
      }
    }
  }
}
</script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<header class="bg-surface border-b border-outline-variant h-16 fixed top-0 w-full z-40">
<div class="flex justify-between items-center w-full px-4 md:px-6 h-full mx-auto max-w-7xl">
<div class="text-xl md:text-2xl font-bold text-primary">ProgramaYa</div>
<div class="flex items-center relative">
<span class="text-sm text-secondary mr-3 hidden sm:block">Sesi&oacute;n iniciada</span>
<button id="menu-btn" class="p-2 hover:bg-surface-variant active:scale-90 rounded-full transition-all duration-150">
<span class="material-symbols-outlined text-on-surface text-2xl">menu</span>
</button>
<div id="menu-dropdown" class="hidden absolute top-full right-0 mt-2 w-64 bg-white border border-outline-variant rounded-2xl shadow-xl z-50 overflow-hidden">
<button id="btn-inicio" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant active:bg-surface-container-high transition-colors duration-150 text-left">
<span class="material-symbols-outlined text-primary">home</span>
<span class="text-sm text-on-surface">Inicio</span>
</button>
<button id="btn-perfil" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant active:bg-surface-container-high transition-colors duration-150 text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary">person</span>
<span class="text-sm text-on-surface">Perfil</span>
</button>
<button id="btn-cursos" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant active:bg-surface-container-high transition-colors duration-150 text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary">school</span>
<span class="text-sm text-on-surface">Ver Cursos</span>
</button>
<button id="btn-logout" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-red-50 active:bg-red-100 transition-colors duration-150 text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-red-500">logout</span>
<span class="text-sm text-red-500">Cerrar Sesi&oacute;n</span>
</button>
</div>
</div>
</div>
</header>
<main class="flex-grow pt-16 pb-32 px-4 md:px-6 max-w-4xl mx-auto w-full">
<div id="loading" class="flex flex-col items-center justify-center py-20">
<span class="material-symbols-outlined text-4xl md:text-5xl text-primary animate-spin">progress_activity</span>
<p class="mt-4 text-lg text-on-surface-variant">Cargando cap&iacute;tulo...</p>
</div>
<div id="chapter-view" class="hidden">
<div class="mb-6 flex items-center justify-between">
<a id="link-volver" class="text-sm text-secondary hover:text-primary font-semibold flex items-center gap-1 transition-colors" href="/ver-cursos">
<span class="material-symbols-outlined text-base">arrow_back</span> Volver a cursos
</a>
<div id="chapter-actions" class="hidden flex gap-2">
<button id="btn-edit-chapter" class="flex items-center gap-1 px-3 py-1.5 bg-surface-variant text-on-surface rounded-xl hover:bg-outline-variant transition-colors text-sm font-semibold">
<span class="material-symbols-outlined text-base">edit</span> Editar
</button>
<button id="btn-delete-chapter" class="flex items-center gap-1 px-3 py-1.5 bg-error-container text-on-error-container rounded-xl hover:bg-error hover:text-on-error transition-colors text-sm font-semibold">
<span class="material-symbols-outlined text-base">delete</span> Eliminar
</button>
</div>
</div>
<div class="bg-white rounded-2xl border border-outline-variant shadow-sm overflow-hidden">
<div class="px-6 py-5 border-b border-outline-variant">
<p id="modulo-label" class="text-xs font-semibold text-secondary uppercase tracking-widest mb-1"></p>
<h2 id="chapter-title" class="text-2xl font-bold text-primary"></h2>
<p id="chapter-counter" class="text-sm text-on-surface-variant mt-1"></p>
</div>
<div id="chapter-content" class="px-6 py-6 text-on-surface leading-relaxed whitespace-pre-wrap">
</div>
<div id="exercises-section" class="hidden px-6 py-6 border-t border-outline-variant space-y-md">
<h3 class="font-bold text-primary flex items-center gap-2">
<span class="material-symbols-outlined">checklist</span> Ejercicios
</h3>
<div id="exercises-list" class="space-y-md"></div>
</div>
</div>
<div class="flex items-center justify-between mt-6">
<button id="btn-prev" class="flex items-center gap-2 px-4 py-2 bg-surface-variant text-on-surface rounded-xl hover:bg-outline-variant transition-colors text-sm font-semibold disabled:opacity-30 disabled:cursor-not-allowed">
<span class="material-symbols-outlined text-base">chevron_left</span> Anterior
</button>
<span id="chapter-indicator" class="text-sm text-on-surface-variant font-medium"></span>
<button id="btn-next" class="flex items-center gap-2 px-4 py-2 bg-primary text-on-primary rounded-xl hover:bg-primary-container hover:text-white transition-colors text-sm font-semibold disabled:opacity-30 disabled:cursor-not-allowed">
Siguiente <span class="material-symbols-outlined text-base">chevron_right</span>
</button>
</div>
</div>
</main>
<div id="modal-editar" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4">
<div class="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
<div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant">
<h3 class="font-bold text-lg text-primary">Editar Capítulo</h3>
<button id="btn-cerrar-modal" class="p-1 hover:bg-surface-variant rounded-full transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="p-6 space-y-4">
<div>
<label class="block text-sm font-semibold text-on-surface mb-1">Título</label>
<input id="edit-title" type="text" class="w-full px-4 py-2 rounded-xl border border-outline-variant bg-surface text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none"/>
</div>
<div>
<label class="block text-sm font-semibold text-on-surface mb-1">Contenido</label>
<textarea id="edit-content" rows="8" class="w-full px-4 py-2 rounded-xl border border-outline-variant bg-surface text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none resize-y"></textarea>
</div>
</div>
<div class="flex gap-3 px-6 py-4 border-t border-outline-variant">
<button id="btn-guardar-modal" class="flex-1 bg-primary text-on-primary font-semibold py-2.5 rounded-xl hover:bg-primary-fixed-variant active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">save</span> Guardar
</button>
<button id="btn-cancelar-modal" class="flex-1 bg-surface-variant text-on-surface font-semibold py-2.5 rounded-xl hover:bg-surface-container-high active:scale-[0.98] transition-all">
Cancelar
</button>
</div>
</div>
</div>
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-1 md:px-4 py-2 bg-surface border-t border-outline-variant rounded-t-xl shadow-2xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant active:bg-surface-container-high transition-all duration-150 px-2 md:p-2 py-1 rounded-lg" href="/pagina-inicio-sesion-est">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] md:text-xs font-semibold">Inicio</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant active:bg-surface-container-high transition-all duration-150 px-2 md:p-2 py-1 rounded-lg" href="/ver-cursos">
<span class="material-symbols-outlined">school</span>
<span class="text-[10px] md:text-xs font-semibold">Cursos</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-3 md:px-4 py-1 scale-90" href="/perfil-estudiante">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="text-[10px] md:text-xs font-semibold">Perfil</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant active:bg-surface-container-high transition-all duration-150 px-2 md:p-2 py-1 rounded-lg" href="#" onclick="localStorage.clear(); window.location.href='/'">
<span class="material-symbols-outlined">logout</span>
<span class="text-[10px] md:text-xs font-semibold">Salir</span>
</a>
</nav>
<footer class="bg-surface border-t border-outline-variant py-6 px-4 md:px-6">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-2">
<span class="text-sm text-primary font-semibold">ProgramaYa</span>
<p class="text-xs text-on-surface-variant">&copy; 2026 ProgramaYa. Todos los derechos reservados.</p>
</div>
</footer>
<script src="/static/js/capitulo.js"></script>
</body>
</html>
