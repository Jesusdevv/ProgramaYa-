<body class="bg-background text-on-surface">
<header class="bg-surface border-b border-outline-variant docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-container-padding py-stack-md mx-auto max-w-7xl">
<div class="text-headline-lg-mobile font-headline-lg-mobile font-bold text-primary">ProgramaYa</div>
<div class="hidden md:block font-body-base text-secondary">Sesión iniciada</div>
                <div class="relative flex items-center">
<button id="menu-btn" class="p-2 hover:bg-surface-variant rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface text-2xl">menu</span>
</button>
<div id="menu-dropdown" class="hidden absolute top-full right-0 mt-2 w-64 bg-white border border-outline-variant rounded-2xl shadow-xl z-50 overflow-hidden">
<button id="btn-inicio" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant transition-colors text-left">
<span class="material-symbols-outlined text-primary">home</span>
<span class="font-body-base text-body-base text-on-surface">Inicio</span>
</button>
<button id="btn-perfil" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant transition-colors text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-body-base text-body-base text-on-surface">Perfil</span>
</button>
<button id="btn-ver-cursos" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant transition-colors text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary">school</span>
<span class="font-body-base text-body-base text-on-surface">Ver Cursos</span>
</button>
<button id="btn-logout" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-red-50 transition-colors text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-red-500">logout</span>
<span class="font-body-base text-body-base text-red-500">Cerrar Sesión</span>
</button>
</div>
</div>
</div>
</header>
<main class="max-w-7xl mx-auto px-container-padding pt-stack-lg pb-32 min-h-screen">
<div class="w-full text-center mb-12">
<h1 class="font-headline-lg text-headline-lg md:font-display-lg md:text-display-lg text-on-primary-fixed-variant" style="color: #6700b5;">Perfil</h1>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">
<div class="space-y-8 order-2 md:order-1">
<div>
<span class="font-label-caps text-label-caps text-secondary mb-2 block uppercase tracking-widest">Rol actual</span>
<div class="glass-card rounded-xl p-8 flex items-center justify-center">
<span class="font-headline-lg text-headline-lg text-on-surface">Estudiante</span>
</div>
</div>
<div>
<span class="font-label-caps text-label-caps text-secondary mb-2 block uppercase tracking-widest">Cursos completos</span>
<div class="glass-card rounded-xl p-8 flex flex-col items-center justify-center">
<span class="font-display-lg text-display-lg text-primary">0</span>
<div class="w-full h-1 bg-surface-variant rounded-full mt-4 overflow-hidden">
<div class="w-0 h-full bg-primary" style="width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);"></div>
</div>
</div>
</div>
</div>
<div class="flex flex-col items-center order-1 md:order-2 space-y-8">
 <div class="relative">
<div class="w-48 h-48 md:w-64 md:h-64 rounded-full border-4 border-primary-container p-2 avatar-glow overflow-hidden bg-white">
<div class="w-full h-full rounded-full bg-surface-container flex items-center justify-center overflow-hidden">
<img id="profile-pic" class="w-full h-full object-cover hidden" src="#" alt="Foto de perfil"/>
<span id="profile-pic-placeholder" class="material-symbols-outlined text-primary" style="font-size: 160px; font-variation-settings: 'FILL' 1;">account_circle</span>
</div>
</div>
<label for="profile-pic-input" class="absolute bottom-4 right-4 bg-primary text-white w-10 h-10 rounded-full flex items-center justify-center cursor-pointer hover:scale-110 transition-transform shadow-lg">
<span class="material-symbols-outlined">edit</span>
</label>
<input id="profile-pic-input" class="hidden" type="file" accept="image/*"/>
<button id="btn-remove-pic" class="mt-4 text-sm text-red-500 hover:text-red-700 font-semibold transition-colors w-full text-center">Quitar foto</button>
</div>
<div class="w-full max-w-sm">
<span class="font-label-caps text-label-caps text-secondary mb-2 block text-center uppercase tracking-widest">Correo</span>
<div class="relative">
<input class="w-full bg-surface-container border-2 border-outline-variant rounded-xl px-6 py-4 text-center font-body-base text-body-base focus:border-primary focus:ring-0 transition-all text-on-surface-variant" placeholder="estudiante@programaya.com" readonly="" type="email" value="estudiante@programaya.com"/>
</div>
</div>
</div>
<div class="space-y-8 order-3 md:order-3">
<div>
<span class="font-label-caps text-label-caps text-secondary mb-2 block uppercase tracking-widest">Usuario</span>
<div class="glass-card rounded-xl p-8">
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-headline-lg-mobile font-headline-lg-mobile p-0 placeholder:text-outline-variant text-on-surface" placeholder="Nombre de usuario" type="text"/>
</div>
</div>
<div>
<span class="font-label-caps text-label-caps text-secondary mb-2 block uppercase tracking-widest">Conviértete en maestro</span>
<button class="w-full glass-card rounded-xl p-8 group flex flex-col items-center justify-center hover:bg-primary transition-all">
<span class="font-display-lg text-display-lg text-primary group-hover:text-white group-hover:scale-105 transition-all">Maestro</span>
<div class="mt-4 flex items-center text-primary group-hover:text-white transition-colors">
<span class="font-label-caps text-label-caps mr-2">APLICAR AHORA</span>
<span class="material-symbols-outlined">arrow_forward</span>
</div>
</button>
</div>
</div>
</div>
</main>
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface border-t border-outline-variant rounded-t-xl shadow-2xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-all p-2 rounded-lg" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-caps text-label-caps">Inicio</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-all p-2 rounded-lg" href="#">
<span class="material-symbols-outlined">school</span>
<span class="font-label-caps text-label-caps">Mis Cursos</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 scale-90 duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-caps text-label-caps">Perfil</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-all p-2 rounded-lg" href="#">
<span class="material-symbols-outlined">code</span>
<span class="font-label-caps text-label-caps">Aprender</span>
</a>
</nav>
<script src="/static/js/perfil_estudiante.js"></script>
</body>
</html>
