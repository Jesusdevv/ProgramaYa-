<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cursos - ProgramaYa</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="/static/css/ver_cursos.css">

        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#8a2be2",
                      "on-primary": "#ffffff",
                      "primary-container": "#eed9ff",
                      "on-primary-container": "#2c0051",
                      "primary-fixed": "#efdbff",
                      "primary-fixed-dim": "#dcb8ff",
                      "on-primary-fixed": "#2c0051",
                      "on-primary-fixed-variant": "#6700b5",
                      "secondary": "#605d64",

                      "secondary-container": "#f0f0f0",
                      "on-secondary-container": "#474747",
                      "secondary-fixed": "#e2e2e2",
                      "secondary-fixed-dim": "#c6c6c6",
                      "on-secondary-fixed": "#1b1b1b",
                      "on-secondary-fixed-variant": "#474747",
                      "surface": "#ffffff",
                      "surface-dim": "#dadada",
                      "surface-bright": "#f9f9f9",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-low": "#f3f3f4",
                      "surface-container": "#eeeeee",
                      "surface-container-high": "#e8e8e8",
                      "surface-container-highest": "#e2e2e2",
                      "surface-variant": "#e2e2e2",
                      "on-surface": "#1a1c1c",
                      "on-surface-variant": "#4a4452",
                      "background": "#f9f9f9",
                      "on-background": "#1a1c1c",
                      "outline": "#7b7483",
                      "outline-variant": "#cbc3d4",
                      "error": "#ba1a1a",
                      "on-error": "#ffffff",
                      "error-container": "#ffdad6",
                      "on-error-container": "#93000a",
                      "inverse-surface": "#2f3131",
                      "inverse-on-surface": "#f0f1f1",
                      "inverse-primary": "#d2bbff",
                      "surface-tint": "#8a2be2",
                      "tertiary": "#8a2be2",
                      "tertiary-container": "#630ed4",
                      "on-tertiary": "#ffffff",
                      "on-tertiary-container": "#fffbff",
                      "tertiary-fixed": "#eaddff",
                      "tertiary-fixed-dim": "#d2bbff",
                      "on-tertiary-fixed": "#25005a",
                      "on-tertiary-fixed-variant": "#5a00c6"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "md": "24px",
                      "gutter": "24px",
                      "container-max": "1280px",
                      "margin-mobile": "16px",
                      "base": "8px",
                      "xs": "4px",
                      "lg": "40px",
                      "xl": "64px",
                      "sm": "12px"
              },
              "fontFamily": {
                      "label-lg": ["Hanken Grotesk"],
                      "label-md": ["Hanken Grotesk"],
                      "display-lg": ["Hanken Grotesk"],
                      "headline-lg-mobile": ["Hanken Grotesk"],
                      "body-lg": ["Hanken Grotesk"],
                      "display-sm": ["Hanken Grotesk"],
                      "headline-md": ["Hanken Grotesk"],
                      "headline-lg": ["Hanken Grotesk"],

              "fontSize": {
                      "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],

                      "display-lg": ["64px", {"lineHeight": "72px", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "display-sm": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.03em", "fontWeight": "800"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]

            },
          },
        }
</script>
</head>
<body class="bg-surface text-on-surface">
<header class="bg-surface border-b border-outline-variant h-16 fixed top-0 w-full z-40">
<div class="flex justify-between items-center w-full px-4 md:px-6 h-full mx-auto max-w-7xl">
<div class="text-xl md:text-2xl font-bold text-primary">ProgramaYa</div>
<div class="flex items-center relative">
<span class="text-sm text-secondary mr-3 hidden sm:block">Sesi&oacute;n iniciada</span>
<button id="menu-btn" class="p-2 hover:bg-surface-variant active:scale-90 rounded-full transition-all duration-150">
<span class="material-symbols-outlined text-on-surface text-2xl">menu</span>
</button>
<div id="menu-dropdown" class="hidden absolute top-full right-0 mt-2 w-64 bg-white border border-outline-variant rounded-2xl shadow-xl z-50 overflow-hidden">
<button id="btn-inicio" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant active:bg-surface-container-high transition-colors duration-150 text-left">
<span class="material-symbols-outlined text-primary">home</span>
<span class="text-sm text-on-surface">Inicio</span>
</button>
<button id="btn-perfil" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant active:bg-surface-container-high transition-colors duration-150 text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary">person</span>
<span class="text-sm text-on-surface">Perfil</span>
</button>
<button id="btn-cursos" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant active:bg-surface-container-high transition-colors duration-150 text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary">school</span>
<span class="text-sm text-on-surface">Cursos</span>
</button>
<button id="btn-crear-curso" class="hidden teacher-only w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant active:bg-surface-container-high transition-colors duration-150 text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary">add_circle</span>
<span class="text-sm text-on-surface">Crear Curso</span>
</button>
<button id="btn-crear-capitulo" class="hidden teacher-only w-full flex items-center gap-4 px-6 py-4 hover:bg-surface-variant active:bg-surface-container-high transition-colors duration-150 text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-primary">note_add</span>
<span class="text-sm text-on-surface">Crear Cap&iacute;tulo</span>
</button>
<button id="btn-logout" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-red-50 active:bg-red-100 transition-colors duration-150 text-left border-t border-outline-variant">
<span class="material-symbols-outlined text-red-500">logout</span>
<span class="text-sm text-red-500">Cerrar Sesi&oacute;n</span>
</button>
</div>
</div>
</div>
</header>
<main class="pt-16 pb-32 px-4 md:px-6 max-w-7xl mx-auto min-h-screen">
<section class="space-y-xl">
<div class="space-y-md">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
<span class="font-headline-md text-headline-md font-bold text-primary">Cursos Disponibles</span>
<div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
<div class="relative flex-1 md:min-w-[240px]">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-outline">
<span class="material-symbols-outlined text-lg">search</span>
</span>
<input id="input-busqueda" type="text" placeholder="Buscar curso..." class="w-full h-10 pl-9 pr-3 rounded-xl border border-outline-variant bg-surface text-sm text-on-surface placeholder:text-on-surface-variant/60 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"/>
</div>
<select id="select-lenguaje" class="h-10 px-3 rounded-xl border border-outline-variant bg-surface text-sm text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
<option value="">Todos los lenguajes</option>
<option value="python">Python</option>
<option value="javascript">JavaScript</option>
</select>
<label id="label-propios" class="hidden items-center gap-2 h-10 px-3 rounded-xl border border-outline-variant bg-surface cursor-pointer select-none hover:bg-surface-variant transition-colors duration-150">
<input id="chk-propios" type="checkbox" class="accent-primary w-4 h-4 rounded"/>
<span class="text-sm text-on-surface">Solo mis cursos</span>
</label>
</div>
</div>
<div id="loading-cursos" class="hidden flex flex-col items-center justify-center py-20">
<span class="material-symbols-outlined text-4xl text-primary animate-spin">progress_activity</span>
<p class="mt-4 text-sm text-on-surface-variant">Cargando cursos...</p>
</div>
<div id="cursos-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter">
</div>
<div id="cursos-empty" class="hidden text-center py-20">
<span class="material-symbols-outlined text-6xl text-outline-variant mb-4">school</span>
<p class="font-body-lg text-body-lg text-on-surface-variant">No hay cursos disponibles por ahora.</p>
</div>
<div id="cargar-mas-container" class="hidden flex justify-center mt-8">
<button id="btn-cargar-mas" class="h-11 px-8 rounded-xl bg-primary text-on-primary text-sm font-semibold hover:bg-primary-fixed-variant active:scale-[0.97] transition-all duration-150 flex items-center gap-2">
<span class="material-symbols-outlined text-lg">expand_more</span> Cargar m&aacute;s
</button>
</div>
</div>
</section>
</main>
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-center items-center gap-2 md:gap-lg py-sm px-2 md:px-margin-mobile bg-surface border-t border-outline-variant z-40">
<button class="flex flex-col items-center justify-center text-on-surface hover:bg-surface-variant active:bg-surface-container-high transition-colors duration-150 px-2 py-1 rounded">
<span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
<span class="text-[10px] md:text-xs font-semibold">Anterior</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary text-on-primary rounded-full px-2 md:px-sm py-1 scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="numbers">numbers</span>
<span class="text-[10px] md:text-xs font-semibold">Páginas</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface hover:bg-surface-variant active:bg-surface-container-high transition-colors duration-150 px-2 py-1 rounded">
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
<span class="text-[10px] md:text-xs font-semibold">Siguiente</span>
</button>
</nav>
<footer class="bg-surface border-t border-outline-variant py-6 px-4 md:px-6">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-2">
<span class="text-sm text-primary font-semibold">ProgramaYa</span>
<p class="text-xs text-on-surface-variant">&copy; 2026 ProgramaYa. Todos los derechos reservados.</p>
</div>
</footer>
<script src="/static/js/ver_cursos.js"></script>
</body>
</html>
